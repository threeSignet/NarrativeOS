# NarrativeOS production stack
#
# Run:
#   docker compose --env-file .env.production -f infra/docker-compose.prod.yml up -d --build
#
# 必须先准备 .env.production（参考 .env.production），并执行 migration：
#   pnpm db:migrate

name: narrativeos-prod

networks:
  narrativeos:
    driver: bridge

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: narrativeos-prod-postgres
    restart: unless-stopped
    networks: [narrativeos]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "log_min_duration_statement=200"
      - "-c"
      - "wal_level=replica"

  redis:
    image: redis:7.2-alpine
    container_name: narrativeos-prod-redis
    restart: unless-stopped
    networks: [narrativeos]
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD}"
      - "--maxmemory"
      - "1gb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "PING"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: narrativeos-prod-minio
    restart: unless-stopped
    networks: [narrativeos]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    image: narrativeos/server:latest
    container_name: narrativeos-prod-server
    restart: unless-stopped
    networks: [narrativeos]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      API_KEY: ${API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      LLM_API_FORMAT: ${LLM_API_FORMAT:-openai}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL_LIGHT: ${LLM_MODEL_LIGHT:-deepseek-v4-flash}
      LLM_MODEL_HEAVY: ${LLM_MODEL_HEAVY:-deepseek-v4-pro}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_DEFAULT_BUCKET: ${MINIO_DEFAULT_BUCKET:-narrativeos-assets}
      CORS_ORIGIN: ${CORS_ORIGIN}
      TZ: ${TZ:-Asia/Shanghai}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${SERVER_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
    name: narrativeos-postgres-data-prod
  redis_data:
    name: narrativeos-redis-data-prod
  minio_data:
    name: narrativeos-minio-data-prod
